<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Portfolio Dashboard Mockups</title>
  <style>
    :root {
      --bg: #06080f;
      --panel: rgba(16, 20, 32, 0.84);
      --panel-strong: rgba(22, 27, 42, 0.96);
      --panel-soft: rgba(255, 255, 255, 0.045);
      --border: rgba(255, 255, 255, 0.09);
      --border-strong: rgba(255, 255, 255, 0.15);
      --text: #f7f8fb;
      --muted: #98a2b3;
      --faint: #667085;
      --good: #38d996;
      --warn: #f5bf4f;
      --bad: #ff5c7a;
      --accent: #68e1fd;
      --accent-2: #9b8cff;
      --radius: 8px;
      --shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
    }

    * { box-sizing: border-box; }

    html,
    body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    body {
      overflow: hidden;
      background:
        radial-gradient(circle at 16% 10%, color-mix(in srgb, var(--accent) 18%, transparent), transparent 34%),
        radial-gradient(circle at 82% 14%, color-mix(in srgb, var(--accent-2) 18%, transparent), transparent 32%),
        linear-gradient(135deg, #05070c 0%, #0b0f19 48%, #070911 100%);
    }

    .stage {
      width: 1600px;
      height: 1000px;
      padding: 28px;
      overflow: hidden;
    }

    .app {
      width: 100%;
      height: 100%;
      display: grid;
      grid-template-columns: 246px 1fr;
      overflow: hidden;
      border: 1px solid var(--border);
      border-radius: 16px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.012)),
        rgba(6, 8, 15, 0.92);
      box-shadow: var(--shadow);
      position: relative;
    }

    .app::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 36px 36px;
      mask-image: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent 58%);
    }

    aside {
      min-width: 0;
      border-right: 1px solid var(--border);
      background: rgba(7, 10, 18, 0.72);
      padding: 22px 18px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      z-index: 1;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .logo {
      width: 38px;
      height: 38px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      background:
        linear-gradient(135deg, color-mix(in srgb, var(--accent) 95%, white 5%), color-mix(in srgb, var(--accent-2) 85%, black 15%));
      color: #041018;
      font-weight: 850;
      font-size: 16px;
      box-shadow: 0 12px 32px color-mix(in srgb, var(--accent) 23%, transparent);
      flex: 0 0 auto;
    }

    .brand-name {
      min-width: 0;
    }

    .brand-name strong {
      display: block;
      font-size: 15px;
      line-height: 1.1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .brand-name span {
      display: block;
      margin-top: 3px;
      color: var(--faint);
      font-size: 11px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .selector {
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.045);
      border-radius: var(--radius);
      padding: 10px 11px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      color: #d8deea;
      font-size: 12px;
    }

    .selector b {
      font-size: 12px;
      font-weight: 650;
      color: var(--text);
      display: block;
    }

    .selector span {
      color: var(--muted);
      display: block;
      margin-top: 2px;
      font-size: 11px;
    }

    nav {
      display: grid;
      gap: 5px;
    }

    .nav-label {
      color: var(--faint);
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      margin: 4px 9px 7px;
    }

    .nav-item {
      height: 36px;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 10px;
      border-radius: 8px;
      color: #b7bfce;
      font-size: 12px;
    }

    .nav-item.active {
      background: linear-gradient(90deg, color-mix(in srgb, var(--accent) 18%, transparent), rgba(255,255,255,0.035));
      color: white;
      border: 1px solid color-mix(in srgb, var(--accent) 30%, transparent);
    }

    .nav-icon {
      width: 18px;
      height: 18px;
      display: grid;
      place-items: center;
      color: var(--accent);
      font-size: 12px;
      flex: 0 0 auto;
    }

    .sidebar-foot {
      margin-top: auto;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.04);
      border-radius: var(--radius);
      padding: 12px;
    }

    .sidebar-foot .small {
      color: var(--muted);
      font-size: 11px;
      line-height: 1.45;
    }

    main {
      min-width: 0;
      z-index: 1;
      display: grid;
      grid-template-rows: 76px 1fr;
      background: linear-gradient(180deg, rgba(11, 15, 25, 0.4), rgba(5, 7, 12, 0.2));
    }

    header {
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      min-width: 0;
    }

    .title-block {
      min-width: 0;
    }

    .eyebrow {
      color: var(--accent);
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }

    h1 {
      margin: 4px 0 0;
      font-size: 24px;
      line-height: 1.15;
      letter-spacing: 0;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 0 0 auto;
    }

    .search {
      width: 290px;
      height: 38px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.05);
      border-radius: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 12px;
      color: var(--muted);
      font-size: 12px;
    }

    .chip,
    .button {
      min-height: 34px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.055);
      color: #d9dfeb;
      font-size: 12px;
      font-weight: 600;
      padding: 0 12px;
      white-space: nowrap;
    }

    .button.primary {
      color: #041018;
      background: linear-gradient(135deg, var(--accent), color-mix(in srgb, var(--accent-2) 70%, white 12%));
      border-color: rgba(255,255,255,0.22);
    }

    .content {
      padding: 20px 24px 24px;
      overflow: hidden;
      display: grid;
      gap: 16px;
      align-content: start;
      min-width: 0;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
    }

    .metric {
      border: 1px solid var(--border);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.026)),
        var(--panel);
      border-radius: var(--radius);
      padding: 14px;
      min-height: 112px;
      display: grid;
      gap: 10px;
      position: relative;
      overflow: hidden;
    }

    .metric::after {
      content: "";
      position: absolute;
      right: -40px;
      top: -40px;
      width: 112px;
      height: 112px;
      border-radius: 50%;
      background: color-mix(in srgb, var(--accent) 12%, transparent);
      filter: blur(6px);
    }

    .metric-top,
    .panel-head,
    .row-between {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-width: 0;
    }

    .metric-label,
    .panel-kicker {
      color: var(--muted);
      font-size: 11px;
      font-weight: 650;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .metric-value {
      font-size: 28px;
      line-height: 1;
      font-weight: 780;
      letter-spacing: 0;
    }

    .metric-foot {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      color: var(--muted);
      font-size: 12px;
      min-width: 0;
    }

    .trend {
      display: inline-flex;
      align-items: center;
      color: var(--good);
      font-size: 11px;
      font-weight: 750;
      white-space: nowrap;
    }

    .trend.down { color: var(--bad); }
    .trend.warn { color: var(--warn); }

    .grid {
      display: grid;
      gap: 14px;
      min-width: 0;
    }

    .grid.cols-3 { grid-template-columns: 1.25fr 0.95fr 0.8fr; }
    .grid.cols-2 { grid-template-columns: 1.45fr 1fr; }
    .grid.cols-4 { grid-template-columns: 1.1fr 1fr 0.9fr 0.9fr; }
    .grid.three-even { grid-template-columns: repeat(3, minmax(0, 1fr)); }

    .panel {
      border: 1px solid var(--border);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.055), rgba(255,255,255,0.022)),
        var(--panel);
      border-radius: var(--radius);
      padding: 14px;
      min-width: 0;
      overflow: hidden;
    }

    .panel.tall { min-height: 330px; }
    .panel.medium { min-height: 246px; }
    .panel.short { min-height: 180px; }
    .panel.compact { padding: 12px; }

    .panel-title {
      font-size: 14px;
      font-weight: 760;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .panel-subtitle {
      color: var(--muted);
      font-size: 12px;
      margin-top: 3px;
    }

    svg.chart {
      width: 100%;
      height: 190px;
      display: block;
      margin-top: 12px;
      overflow: visible;
    }

    .bars {
      display: grid;
      gap: 11px;
      margin-top: 16px;
    }

    .bar-row {
      display: grid;
      grid-template-columns: 92px 1fr 46px;
      align-items: center;
      gap: 10px;
      font-size: 12px;
      color: #d4d9e5;
      min-width: 0;
    }

    .bar-track {
      height: 8px;
      border-radius: 99px;
      background: rgba(255,255,255,0.07);
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      width: var(--w);
      border-radius: inherit;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
      table-layout: fixed;
    }

    th,
    td {
      border-bottom: 1px solid rgba(255,255,255,0.07);
      text-align: left;
      padding: 10px 8px;
      font-size: 12px;
      color: #d7deea;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    th {
      color: var(--faint);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 750;
    }

    tr:last-child td { border-bottom: 0; }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 99px;
      padding: 4px 8px;
      background: rgba(255,255,255,0.055);
      border: 1px solid var(--border);
      font-size: 11px;
      color: #dbe2ee;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--good);
      box-shadow: 0 0 0 4px color-mix(in srgb, var(--good) 13%, transparent);
      flex: 0 0 auto;
    }

    .dot.warn { background: var(--warn); box-shadow: 0 0 0 4px color-mix(in srgb, var(--warn) 14%, transparent); }
    .dot.bad { background: var(--bad); box-shadow: 0 0 0 4px color-mix(in srgb, var(--bad) 14%, transparent); }
    .dot.info { background: var(--accent); box-shadow: 0 0 0 4px color-mix(in srgb, var(--accent) 14%, transparent); }

    .pill-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 14px;
    }

    .pill {
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.052);
      color: #d6ddeb;
      border-radius: 99px;
      padding: 7px 10px;
      font-size: 11px;
      font-weight: 650;
      white-space: nowrap;
    }

    .list {
      margin-top: 12px;
      display: grid;
      gap: 9px;
    }

    .list-item {
      border: 1px solid rgba(255,255,255,0.075);
      background: rgba(255,255,255,0.04);
      border-radius: 8px;
      padding: 10px;
      min-width: 0;
    }

    .list-item strong {
      display: block;
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .list-item span {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 11px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .calendar {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 7px;
      margin-top: 14px;
    }

    .day {
      height: 39px;
      border: 1px solid rgba(255,255,255,0.075);
      background: rgba(255,255,255,0.035);
      border-radius: 7px;
      color: #d8dfea;
      font-size: 12px;
      display: grid;
      place-items: center;
      position: relative;
    }

    .day.busy {
      background: color-mix(in srgb, var(--accent) 16%, transparent);
      border-color: color-mix(in srgb, var(--accent) 34%, transparent);
    }

    .day.focus {
      color: #041018;
      background: var(--accent);
      border-color: transparent;
      font-weight: 800;
    }

    .day.muted {
      color: var(--faint);
      background: rgba(255,255,255,0.02);
      border-color: rgba(255,255,255,0.045);
    }

    .map {
      height: 252px;
      margin-top: 12px;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.075);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.025), rgba(255,255,255,0)),
        #07101a;
      position: relative;
    }

    .map svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .map-label {
      position: absolute;
      border: 1px solid var(--border);
      background: rgba(4, 8, 14, 0.78);
      backdrop-filter: blur(10px);
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 11px;
      color: #dfe6f2;
      box-shadow: 0 12px 36px rgba(0,0,0,0.28);
    }

    .split {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-top: 12px;
    }

    .mini-stat {
      border: 1px solid rgba(255,255,255,0.075);
      background: rgba(255,255,255,0.04);
      border-radius: 8px;
      padding: 11px;
      min-width: 0;
    }

    .mini-stat span {
      display: block;
      color: var(--muted);
      font-size: 11px;
    }

    .mini-stat strong {
      display: block;
      margin-top: 4px;
      font-size: 18px;
    }

    .query-box {
      margin-top: 12px;
      border: 1px solid color-mix(in srgb, var(--accent) 22%, var(--border));
      background: rgba(255,255,255,0.05);
      border-radius: 8px;
      padding: 13px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.02);
    }

    .query-text {
      color: #e8edf6;
      font-size: 14px;
      line-height: 1.35;
    }

    .insight {
      display: grid;
      grid-template-columns: 34px 1fr;
      gap: 10px;
      align-items: start;
      border: 1px solid rgba(255,255,255,0.075);
      background: rgba(255,255,255,0.04);
      border-radius: 8px;
      padding: 10px;
      margin-top: 10px;
    }

    .insight-icon {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      background: color-mix(in srgb, var(--accent) 18%, transparent);
      color: var(--accent);
      font-size: 14px;
      font-weight: 800;
    }

    .insight strong {
      display: block;
      font-size: 12px;
    }

    .insight span {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.35;
    }

    .cards-row {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 14px;
    }

    .card-stack {
      display: grid;
      gap: 10px;
      margin-top: 12px;
    }

    .credit-card {
      border-radius: 12px;
      padding: 16px;
      min-height: 116px;
      background:
        radial-gradient(circle at 82% 20%, rgba(255,255,255,0.18), transparent 28%),
        linear-gradient(135deg, color-mix(in srgb, var(--accent) 55%, #111827), color-mix(in srgb, var(--accent-2) 60%, #111827));
      border: 1px solid rgba(255,255,255,0.18);
      display: grid;
      align-content: space-between;
      color: white;
    }

    .credit-card .number {
      font-size: 17px;
      letter-spacing: 0.08em;
      font-weight: 700;
    }

    .credit-card small {
      color: rgba(255,255,255,0.76);
      font-size: 10px;
      text-transform: uppercase;
    }

    .progress-ring {
      width: 154px;
      height: 154px;
      margin: 14px auto 8px;
      display: block;
    }

    .heatmap {
      display: grid;
      grid-template-columns: repeat(18, 1fr);
      gap: 5px;
      margin-top: 14px;
    }

    .heat {
      aspect-ratio: 1;
      border-radius: 4px;
      background: color-mix(in srgb, var(--accent) calc(var(--v) * 1%), rgba(255,255,255,0.045));
      border: 1px solid rgba(255,255,255,0.045);
    }

    .mobile-hint {
      display: none;
    }
  </style>
</head>

    function metrics(items) {

      }).join("")}</div>`;

    function spark(points, w = 86, h = 26) {
      const max = Math.max(...points);
      const min = Math.min(...points);
      const xy = points.map((p, i) => {
        const x = (i / (points.length - 1)) * w;
        const y = h - ((p - min) / (max - min || 1)) * h;
        return `${x.toFixed(1)},${y.toFixed(1)}`;
      }).join(" ");
      return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" aria-hidden="true">
        <polyline points="${xy}" fill="none" stroke="var(--accent)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>`;
    }

    function lineChart(series, labels = []) {
      const w = 700;
      const h = 210;
      const pad = 20;
      const all = series.flatMap(s => s.values);
      const max = Math.max(...all);
      const min = Math.min(...all);
      const grid = [0, 1, 2, 3, 4].map(i => {
        const y = pad + (i * (h - pad * 2) / 4);
        return `<line x1="${pad}" x2="${w - pad}" y1="${y}" y2="${y}" stroke="rgba(255,255,255,0.065)"/>`;
      }).join("");
      const paths = series.map((s, idx) => {
        const pts = s.values.map((v, i) => {
          const x = pad + (i / (s.values.length - 1)) * (w - pad * 2);
          const y = h - pad - ((v - min) / (max - min || 1)) * (h - pad * 2);
          return `${x.toFixed(1)},${y.toFixed(1)}`;
        }).join(" ");
        const color = idx === 0 ? "var(--accent)" : "var(--accent-2)";
        return `<polyline points="${pts}" fill="none" stroke="${color}" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>`;
      }).join("");
      const axis = labels.map((l, i) => {
        const x = pad + (i / (labels.length - 1)) * (w - pad * 2);
        return `<text x="${x}" y="${h - 2}" fill="rgba(255,255,255,0.38)" font-size="11" text-anchor="middle">${l}</text>`;
      }).join("");
      return `<svg class="chart" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">${grid}${paths}${axis}</svg>`;
    }

    function areaChart(values, labels = []) {
      const w = 700;
      const h = 210;
      const pad = 20;
      const max = Math.max(...values);
      const min = Math.min(...values);
      const pts = values.map((v, i) => {
        const x = pad + (i / (values.length - 1)) * (w - pad * 2);
        const y = h - pad - ((v - min) / (max - min || 1)) * (h - pad * 2);
        return [x, y];
      });
      const line = pts.map(([x, y]) => `${x.toFixed(1)},${y.toFixed(1)}`).join(" ");
      const area = `${pad},${h-pad} ${line} ${w-pad},${h-pad}`;
      const grid = [0,1,2,3].map(i => `<line x1="${pad}" x2="${w-pad}" y1="${pad + i * 44}" y2="${pad + i * 44}" stroke="rgba(255,255,255,0.065)"/>`).join("");
      const axis = labels.map((l, i) => `<text x="${pad + (i/(labels.length-1))*(w-pad*2)}" y="${h - 2}" fill="rgba(255,255,255,0.38)" font-size="11" text-anchor="middle">${l}</text>`).join("");
      return `<svg class="chart" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
        <defs><linearGradient id="areaFill" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="var(--accent)" stop-opacity="0.32"/><stop offset="1" stop-color="var(--accent)" stop-opacity="0"/></linearGradient></defs>
        ${grid}<polygon points="${area}" fill="url(#areaFill)"/><polyline points="${line}" fill="none" stroke="var(--accent)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>${axis}
      </svg>`;
    }

      return `<svg class="progress-ring" viewBox="0 0 100 100">

        <circle cx="${c}" cy="${c}" r="${r}" fill="none" stroke="var(--accent)" stroke-width="10" stroke-linecap="round" stroke-dasharray="${dash}" transform="rotate(-90 50 50)"/>
